apis:
  - aid: amazon-batch:amazon-batch-api
    name: Amazon Batch API
    description: >-
      The AWS Batch API enables programmatic management of batch computing
      workloads, including creating and managing compute environments, job
      queues, job definitions, scheduling policies, and submitting and
      monitoring batch jobs at any scale. Supports single-node jobs, array
      jobs for parameter sweeps, and multi-node parallel jobs for HPC.
    humanURL: https://aws.amazon.com/batch/
