    contact:
      - FN: Amazon Web Services
        url: https://aws.amazon.com/contact-us/
    features:
      - name: Managed Compute Environments
        description: >-
          Automatically provision, scale, and terminate EC2 On-Demand, Spot,
          Fargate, or EKS compute resources based on job demand.
      - name: Array Jobs
        description: >-
          Run N identical parallel job instances with unique array indices for
          parameter sweeps, data parallelism, and large-scale simulations.
      - name: Multi-Node Parallel Jobs
        description: >-
          Execute tightly-coupled HPC workloads (MPI) across multiple EC2
          instances in a single coordinated job.
      - name: Spot Instance Integration
        description: >-
          Run batch jobs on EC2 Spot Instances with automatic retry on
          interruption, reducing compute costs by up to 90%.
      - name: Fair-Share Scheduling
        description: >-
          Distribute compute resources equitably across users and teams using
          configurable share weights and usage tracking.
      - name: GPU Support
        description: >-
          Run GPU-accelerated workloads including machine learning training
          and scientific simulations on GPU instance types.
      - name: EKS Integration
        description: >-
          Run batch jobs on Amazon EKS clusters with Kubernetes-native
          pod specifications and resource management.
    useCases:
      - name: Scientific Computing
        description: >-
          Run genomics, climate modeling, and other large-scale simulations
          with HPC array jobs on managed compute environments.
      - name: Data Processing Pipelines
        description: >-
          Process large datasets in parallel with array jobs and Spot Instances
          for cost-efficient ETL and analytics workloads.
      - name: Machine Learning Training
        description: >-
          Run distributed ML training jobs across GPU instances with
          multi-node parallel job support.
      - name: Media Transcoding
        description: >-
          Process large volumes of media files in parallel using containerized
          transcoding jobs on managed compute environments.
    integrations:
      - name: Amazon ECR
        description: Store and pull container images for batch job definitions from Amazon Elastic Container Registry
      - name: Amazon S3
        description: Read input data and write job output to Amazon S3 storage
      - name: Amazon ECS
        description: AWS Batch uses ECS under the hood for container orchestration on EC2 and Fargate
      - name: Amazon EKS
        description: Run batch jobs on Kubernetes clusters via Amazon Elastic Kubernetes Service
      - name: AWS CloudWatch Logs
        description: Stream job container logs to CloudWatch Logs for monitoring and debugging
      - name: AWS Step Functions
        description: Orchestrate multi-step workflows with AWS Batch jobs as workflow tasks
      - name: Amazon EventBridge
        description: Trigger batch jobs on schedule or in response to events
    solutions:
      - name: Cost-Optimized HPC
        description: >-
          Use Spot Instances with SPOT_CAPACITY_OPTIMIZED allocation strategy
          to run HPC workloads at a fraction of On-Demand pricing.
      - name: Serverless Batch
        description: >-
          Use Fargate compute environments to run batch jobs with no EC2
          instance management and per-second billing.
