name: Amazon Batch
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
specificationVersion: '0.19'
description: >-
  AWS Batch enables developers, scientists, and engineers to easily and
  efficiently run hundreds of thousands of batch computing jobs on AWS.
  AWS Batch dynamically provisions the optimal quantity and type of compute
  resources based on the volume and specific resource requirements of the
  batch jobs submitted.
