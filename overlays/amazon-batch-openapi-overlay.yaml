overlay: 1.0.0
info:
  title: API Evangelist enhancements for Amazon Batch API
  version: 1.0.0
extends: openapi/amazon-batch-openapi.yml
actions:
  - target: $.info
    update:
      x-apievangelist-slug: amazon-batch
      x-apievangelist-provider: Amazon Web Services
      x-api-lifecycle: production
      x-authentication: aws-sigv4
  - target: $.info
    update:
      x-tags:
        - Batch Computing
        - Compute
        - HPC
        - Job Scheduling
        - Containers
  - target: $.paths['/v1/submitjob'].post
    update:
      x-use-cases:
        - Scientific computing array jobs
        - Data processing pipelines
        - Machine learning training
  - target: $.paths['/v1/createcomputeenvironment'].post
    update:
      x-compute-types:
        - EC2 On-Demand
        - EC2 Spot
        - Fargate
        - EKS
